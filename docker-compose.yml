services:
  # ─── Neo4j (Knowledge Graph v0) ─────────────────────
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/zylo12345}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Database Setup (Tables + Seeds) ────────────
  setup:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    # Uses DATABASE_URL and REDIS_URL from .env
    command: python -m scripts.setup
    restart: "no"

  # ─── Backend API ────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      setup:
        condition: service_completed_successfully
    volumes:
      - upload_data:/app/uploads
    restart: unless-stopped

  # ─── Trigger Scheduler ─────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    depends_on:
      setup:
        condition: service_completed_successfully
    restart: unless-stopped

  # ─── ML Service ────────────────────────────────────
  ml:
    build:
      context: ./backend
      dockerfile: ./ml/Dockerfile
    ports:
      - "8001:8001"
    restart: unless-stopped

  # ─── Admin Dashboard ────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  # ─── Mobile Web App ─────────────────────────────────
  mobile_web:
    build:
      context: ./mobile
      dockerfile: Dockerfile.prod
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  # ─── Nginx Reverse Proxy ──────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - upload_data:/var/www/uploads:ro
    depends_on:
      admin:
        condition: service_started
      backend:
        condition: service_started
      mobile_web:
        condition: service_started
    restart: unless-stopped

volumes:
  neo4j_data:
  upload_data:
